    <rect x="220" y="140" width="18" height="108" rx="9"/>
    <rect x="247" y="140" width="18" height="108" rx="9"/>
    <rect x="274" y="140" width="18" height="108" rx="9"/>
    <rect x="220" y="232" width="72" height="24" rx="4"/>
    <rect x="247" y="232" width="18" height="144" rx="9"/>
  </g>
</svg>
